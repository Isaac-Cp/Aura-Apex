services:
  - type: web
    name: aura-apex-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PORT
        value: 8080
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: AURA_MODE
        value: production
    autoDeploy: true
