name: CI
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -V
      - run: pip install -r "requirements.txt"
      - run: pip install pytest ruff mypy
      - run: ruff check .
      - run: mypy --ignore-missing-imports .
      - run: pytest -q
